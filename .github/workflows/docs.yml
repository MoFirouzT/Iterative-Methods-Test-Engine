name: Docs

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

# deploydocs pushes the built site to the gh-pages branch.
permissions:
  contents: write
  pull-requests: read
  statuses: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & deploy Documenter site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'      # latest stable 1.x, matching ci.yml

      - uses: julia-actions/cache@v2

      # The docs environment only needs Documenter (no TestEngine deps) — see docs/Project.toml.
      - name: Instantiate docs environment
        run: julia --project=docs -e 'using Pkg; Pkg.instantiate()'

      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # deploydocs auth for gh-pages push
        run: julia --project=docs docs/make.jl
